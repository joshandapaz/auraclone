name: Aura APK Creator

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Generate Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JRE
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App (Static Export)
        env:
          AURA_STATIC_EXPORT: true
        run: |
          npm run build
          # Verify 'out' directory exists and has index.html
          if [ ! -f out/index.html ]; then
            echo "Error: Static export failed. out/index.html not found!"
            exit 1
          fi

      - name: Capacitor Android Sync
        run: |
          # Sync with the generated 'out' folder
          # Ensure android platform is already present or add it
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Mobile-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
